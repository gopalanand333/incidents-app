_schema-version: "3.1"
ID: incidents
description: A simple CAP project.
version: 1.0.0
modules:
- name: incidents-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: incidents-cls
  - name: incidents-auth
  - name: incidents-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    builder: npm
- name: incidents-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: incidents-db
  parameters:
    buildpack: nodejs_buildpack
- name: incidents-destination-content
  type: com.sap.application.content
  requires:
  - name: incidents-destination-service
    parameters:
      content-target: true
  - name: incidents_html_repo_host
    parameters:
      service-key:
        name: incidents_html_repo_host-key
  - name: incidents-auth
    parameters:
      service-key:
        name: incidents-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ns_incidents_incidents_html_repo_host
          ServiceInstanceName: incidents-html5-app-host-service
          ServiceKeyName: incidents_html_repo_host-key
          sap.cloud.service: ns.incidents
        - Authentication: OAuth2UserTokenExchange
          Name: ns_incidents_incidents_auth
          ServiceInstanceName: incidents-auth
          ServiceKeyName: incidents-auth-key
          sap.cloud.service: ns.incidents
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: incidents-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: incidents_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - nsincidents.zip
      name: nsincidents
      target-path: resources/
- name: nsincidents
  type: html5
  path: app/incidents
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: incidents-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: incidents-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: incidents-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: incidents-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: incidents-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: incidents-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: incidents_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: incidents-html5-app-host-service
    service-plan: app-host
- name: incidents-cls
  type: org.cloudfoundry.managed-service
  parameters:
    service: cloud-logging
    service-plan: dev
  properties:
    ingest_otlp:
      enabled: true
parameters:
  deploy_mode: html5-repos
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npx cds build --production
